<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Expenses</h2>
    <input type="text" id="description" placeholder="What did you buy?">
    <input type="number" id="amount" placeholder="How much?">
    <button onclick="addExpense()">Add Expense</button>
    <ul id="list"></ul>
</div>

<script>
    function addExpense() {
        let desc = document.getElementById('description').value;
        let amt = document.getElementById('amount').value;
        if(desc && amt) {
            let li = document.createElement('li');
            li.textContent = `${desc}: $${amt}`;
            document.getElementById('list').appendChild(li);
        }
    }
</script>
</body>
</html>
