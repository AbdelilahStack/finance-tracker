<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }

        .balance-box {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.2); }

        ul { list-style: none; padding: 0; margin-top: 2rem; }

        li {
            background: #334155;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: var(--danger);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>
    <div class="balance-box">
        <small>Total Balance</small>
        <div id="total" style="font-size: 1.8rem; font-weight: bold;">$0.00</div>
    </div>

    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amt" placeholder="Amount ($)">
    <button onclick="addTransaction()">Add Transaction</button>

    <ul id="list"></ul>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function updateUI() {
        const list = document.getElementById('list');
        const totalDisplay = document.getElementById('total');
        list.innerHTML = '';
        
        let total = 0;
        transactions.forEach((t, index) => {
            total += parseFloat(t.amount);
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${t.description}</span>
                <div>
                    <span>$${t.amount}</span>
                    <button class="delete-btn" onclick="removeTransaction(${index})">Delete</button>
                </div>
            `;
            list.appendChild(li);
        });

        totalDisplay.innerText = `$${total.toFixed(2)}`;
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amt = document.getElementById('amt').value;

        if(desc && amt) {
            transactions.push({ description: desc, amount: amt });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            updateUI();
        }
    }

    function removeTransaction(index) {
        transactions.splice(index, 1);
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
